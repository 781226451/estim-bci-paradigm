# ============================================================
# 患者端配置文件
# 修改后保存即可，无需改动 patient.py。重新运行程序生效。
# ============================================================

[screen]
# 患者端显示在哪一块屏幕上。
# 跨电脑运行时通常设为 0；只有患者电脑多屏时才需要改成 1 等。
patient = 0

# 是否全屏显示。
#   true  = 全屏（正式实验用）
#   false = 窗口模式（调试用）
fullscreen = true

# 非全屏（fullscreen = false）时的窗口尺寸，单位：像素 [宽, 高]
window_size = [3840, 2160]

[monitor]
# PsychoPy Monitor Center 中的显示器配置名。
# 默认 testMonitor 是 PsychoPy 自带配置，可避免启动时创建临时 monitor 的 warning。
name = "testMonitor"

[lsl]
# 医生端发控制指令的 LSL stream 名称。医生端和患者端必须一致。
command_stream = "estim_bci_command"

# 患者端回传评分的 LSL stream 名称。医生端和患者端必须一致。
rating_stream = "estim_bci_rating"

# 查找医生端 LSL stream 的间隔和单次超时；数值越小，界面越不容易被阻塞。
resolve_interval_s = 1.0
resolve_timeout_s = 0.05

[font]
# 中文字体名称。Windows 11 自带 "Microsoft YaHei"。
# 若显示方块或缺字，可改为 "SimHei" / "SimSun" 等已安装字体。
name = "Microsoft YaHei"
