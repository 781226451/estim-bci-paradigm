# ============================================================
# 患者端配置文件
# 修改后保存即可，无需改动 patient.py。重新运行程序生效。
# ============================================================

[screen]
# 是否全屏显示。
#   true  = 全屏（正式实验用）
#   false = 窗口模式（调试用）
fullscreen = true

# 非全屏（fullscreen = false）时的窗口尺寸，单位：像素 [宽, 高]
window_size = [3840, 2160]

[monitor]
# PsychoPy Monitor Center 中的显示器配置名。
# 默认 testMonitor 是 PsychoPy 自带配置，可避免启动时创建临时 monitor 的 warning。
name = "testMonitor"

[rating]
# 当前评分量表：visual analog scale-depression，简称 VAS-D。
# VAS-D 使用 0-10 分。
name = "VAS-D"
full_name = "visual analog scale-depression"
min = 0
max = 10
step = 1

[audio]
# 麦克风录音参数。每次评分后会自动开始录音，点击“停止并保存”后写入 WAV 文件。
# 采样率与声道数自动采用所选麦克风的原生参数（单/多声道均支持），无需在此设置。

# 单次录音缓冲上限，单位：秒。录音时间不要超过该值。
max_recording_s = 300

[font]
# 中文字体名称。Windows 11 自带 "Microsoft YaHei"。
# 若显示方块或缺字，可改为 "SimHei" / "SimSun" 等已安装字体。
name = "Microsoft YaHei"
